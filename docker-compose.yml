services:
  conocernos:
    image: ghcr.io/davic80/conocernos:${IMAGE_TAG:-latest}
    build: .
    container_name: conocernos
    restart: unless-stopped
    ports:
      - "8762:8080"
    environment:
      PORT: "8080"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: conocernos-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:-}"
    depends_on:
      - conocernos
    profiles: [tunnel]
